trigger:
  branches:
    include: [ main, feature/* ]
pr:
  branches:
    include: [ '*' ]

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  fetchDepth: 0

# Detectar clases .java cambiadas y preparar la opción para SpotBugs
- bash: |
    set -euo pipefail
    echo "## Detectando base..."
    BASE="${SYSTEM_PULLREQUEST_TARGETBRANCH:-}"
    BASE="${BASE#refs/heads/}"
    [ -z "$BASE" ] && BASE="main"
    echo "Base = $BASE"

    # Asegura que exista el remoto de la base; si no, trae sólo esa rama
    if ! git show-ref --verify --quiet "refs/remotes/origin/$BASE"; then
      git fetch --no-tags origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
    fi

    # Archivos .java cambiados respecto a la base
    CHANGED="$(git diff --name-only "origin/$BASE"...HEAD -- 'src/**/*.java' || true)"

    if [ -z "$CHANGED" ]; then
      echo "No hay .java cambiados; ejecución completa (sin onlyAnalyze)."
      echo "##vso[task.setvariable variable=SPOTBUGS_ONLY_ANALYZE_OPTION]"
      exit 0
    fi

    # Convertir rutas a nombres de clase/paquete para SpotBugs (separados por ':')
    LIST=""
    while IFS= read -r f; do
      cls="$(echo "$f" | sed -E 's#^src/(main|test)/java/##; s#/#.#g; s#\.java$##')"
      [ -n "$cls" ] && LIST="${LIST:+$LIST:}${cls}"
    done <<< "$CHANGED"

    echo "Clases detectadas: $LIST"
    echo "##vso[task.setvariable variable=SPOTBUGS_ONLY_ANALYZE_OPTION]-Dspotbugs.onlyAnalyze=$LIST"
  displayName: detect

- task: Maven@3
  displayName: 'Incremental: build + tests + SpotBugs'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'verify'
    options: '-B $(SPOTBUGS_ONLY_ANALYZE_OPTION)'
    mavenOptions: '-Xmx1024m'
    publishJUnitResults: true
    testR
