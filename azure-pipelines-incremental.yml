trigger:
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  fetchDepth: 0

- bash: |
    set -euo pipefail
    echo "Detectando base..."
    BASE="${SYSTEM_PULLREQUEST_TARGETBRANCH:-}"
    BASE="${BASE#refs/heads/}"
    if [ -z "$BASE" ]; then BASE="main"; fi
    echo "Base = $BASE"

    if ! git show-ref --verify --quiet "refs/remotes/origin/$BASE"; then
      git fetch --no-tags origin "+refs/heads/$BASE:refs/remotes/origin/$BASE"
    fi

    CHANGED="$(git diff --name-only "origin/$BASE"...HEAD -- 'src/**/*.java' || true)"

    if [ -z "$CHANGED" ]; then
      echo "No hay .java cambiados; ejecución completa."
      echo "##vso[task.setvariable variable=SPOTBUGS_ONLY_ANALYZE_OPTION;]"
      exit 0
    fi

    LIST=""
    while IFS= read -r f; do
      cls="$(echo "$f" | sed -E 's#^src/(main|test)/java/##; s#/#.#g; s#\.java$##')"
      if [ -n "$cls" ]; then
        if [ -z "$LIST" ]; then LIST="$cls"; else LIST="$LIST:$cls"; fi
      fi
    done <<< "$CHANGED"

    echo "Clases detectadas: $LIST"
    echo "##vso[task.setvariable variable=SPOTBUGS_ONLY_ANALYZE_OPTION;]-Dspotbugs.onlyAnalyze=$LIST"
  displayName: 'detect'

- task: Maven@3
  displayName: 'Incremental: build + tests + SpotBugs'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'verify'
    options: |
      -B $(SPOTBUGS_ONLY_ANALYZE_OPTION)
    mavenOptions: '-Xmx1024m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/*.xml'

- bash: |
    echo "=== TARGET ==="
    find "$(System.DefaultWorkingDirectory)/target" -maxdepth 3 -type f -print || true
  displayName: 'Debug: listar artefactos'
  condition: always()

- task: PublishBuildArtifacts@1
  displayName: 'Publicar SARIF como CodeAnalysisLogs'
  condition: always()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/target/spotbugs'
    ArtifactName: 'CodeAnalysisLogs'
    publishLocation: 'Container'

