# Permissive SpotBugs scan: reporta pero no falla por hallazgos
trigger:
  branches:
    include:
      - main
      - feature/*

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  fetchDepth: 0

# Importante: no fallar por findings de SpotBugs
# (el goal 'check' sigue corriendo porque lo ataste a 'verify' en el POM,
#  pero con -Dspotbugs.failOnError=false devuelve exit code 0)
- task: Maven@3
  displayName: 'Permissive: build + tests + SpotBugs (solo falla por ERROR)'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'verify'
    options: |
      -B
    mavenOptions: '-Xmx1024m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/*.xml'

# (Opcional) listar para depurar rutas
- bash: |
    echo "=== TARGET ==="
    find "$(System.DefaultWorkingDirectory)/target" -maxdepth 3 -type f -print || true
  displayName: 'Debug: listar artefactos'
  condition: always()

# Publica el SARIF para la pestaña Scans (y para histórico por build)
- task: PublishBuildArtifacts@1
  displayName: 'Publicar SARIF como CodeAnalysisLogs'
  condition: always()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/target/spotbugs'
    ArtifactName: 'CodeAnalysisLogs'
    publishLocation: 'Container'

