
pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

steps:
- checkout: self
  fetchDepth: 0  # útil para PRs e historial

- task: Maven@3
  displayName: 'Build + tests + SpotBugs'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'verify'
    options: '-B'
    mavenOptions: '-Xmx1024m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/*.xml'

# (Opcional) Lista lo que haya en target para confirmar rutas
- script: |
    echo "=== LISTADO target ==="
    find "$(System.DefaultWorkingDirectory)/target" -maxdepth 3 -type f -print || true
  displayName: 'Debug: listar artefactos SpotBugs'
  condition: always()

# Publica la carpeta EXACTA donde cae el SARIF
- task: PublishBuildArtifacts@1
  displayName: 'Publicar SARIF como CodeAnalysisLogs'
  condition: always()
  inputs:
    PathtoPublish: '$(System.DefaultWorkingDirectory)/target/spotbugs'
    ArtifactName: 'CodeAnalysisLogs'
    publishLocation: 'Container'
