name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check RBM discovery document
        run: |
          REMOTE_HASH=$(curl -sS "https://rcsbusinessmessaging.googleapis.com/\$discovery/rest?version=v1" | sha256sum | cut -d ' ' -f1)
          LOCAL_HASH=$(sha256sum docs/discovery/rbm-v1.json | cut -d ' ' -f1)
          if [ "$REMOTE_HASH" != "$LOCAL_HASH" ]; then
            echo "Discovery document differs from remote. Run tools/update-discovery.sh" >&2
            exit 1
          fi
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Run tests
        run: mvn -B verify
